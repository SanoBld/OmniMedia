name: Build OmniMedia Windows Exe

on:
  push:
    branches: [ "main" ] # Se lance quand tu push sur la branche main
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest # GitHub utilise une machine Windows pour compiler l'exe

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller OmniMedia.spec

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OmniMedia-Windows-Exe
        path: dist/OmniMedia.exe